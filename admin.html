<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin - Quản Lý Đơn</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#222}
.navbar{background:#fff;padding:16px 24px;display:flex;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.container{max-width:1200px;margin:auto;padding:30px 20px}
.card{background:#fff;border-radius:18px;padding:22px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:20px}
.btn{background:#2563eb;color:#fff;border:none;padding:10px 16px;border-radius:10px;cursor:pointer;margin-right:8px}
.status{display:inline-block;padding:6px 10px;border-radius:8px;background:#f1f5f9;margin-top:8px}
</style>
</head>
<body>
<div class="navbar">
  <div>👑 Admin Dashboard</div>
  <div id="adminInfo">Quản lý đơn cày thuê</div>
</div>

<div class="container">
  <div class="card">
    <h2>📦 Đơn Cày Thuê Khách Gửi</h2>
    <div id="orderList"></div>
  </div>

  <div class="card">
    <h2>💳 Yêu Cầu Nạp Tiền</h2>
    <div id="depositList"></div>
  </div>
</div>

<script>
function loadOrders(){
  const history = JSON.parse(localStorage.getItem('history') || '[]');
  const user = JSON.parse(localStorage.getItem('user') || '{}');

  const orders = history.filter(x => x.includes('📦'));
  const deposits = history.filter(x => x.includes('💳') && x.includes('⏳'));

  document.getElementById('orderList').innerHTML = orders.length
    ? orders.map((o,i)=>`<div class="status">👤 ${user.email || 'Khách'} | ${o}</div> <button class="btn" onclick="completeOrder(${i})">✅ Hoàn thành</button>`).join('<br><br>')
    : 'Không có đơn nào';

  document.getElementById('depositList').innerHTML = deposits.length
    ? deposits.map((d,i)=>`<div class="status">👤 ${user.email || 'Khách'} | ${d}</div> <button class="btn" onclick="approveDeposit()">✅ Duyệt nạp</button>`).join('<br><br>')
    : 'Không có yêu cầu nạp';
}

function completeOrder(index){
  const history = JSON.parse(localStorage.getItem('history') || '[]');
  const item = history.find(x => x.includes('📦'));
  if(item){
    history.unshift(item + ' | ✅ Hoàn thành');
    localStorage.setItem('history', JSON.stringify(history));
    alert('Đã hoàn thành đơn');
    loadOrders();
  }
}

function approveDeposit(){
  const req = JSON.parse(localStorage.getItem('pendingDeposit') || 'null');
  if(!req) return alert('Không có yêu cầu');
  const u = JSON.parse(localStorage.getItem('user') || '{}');
  u.balance = (u.balance || 0) + req.amount;
  localStorage.setItem('user', JSON.stringify(u));

  const history = JSON.parse(localStorage.getItem('history') || '[]');
  history.unshift(`💳 ${req.method} | ${req.amount.toLocaleString('vi-VN')}đ | ✅ Thành công`);
  localStorage.setItem('history', JSON.stringify(history));
  localStorage.removeItem('pendingDeposit');
  alert('Đã duyệt nạp');
  loadOrders();
}

loadOrders();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
body{
  font-family:Arial;
  background:#eef2f7;
  padding:30px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}
</style>
</head>
<body>

<div class="card">
  <h2>📦 Đơn khách gửi</h2>
  <div id="orders">Đang tải...</div>
</div>

<div class="card">
  <h2>💳 Yêu cầu nạp</h2>
  <div id="deposits">Đang tải...</div>
</div>

<script type="module">
import { db, collection, onSnapshot } from './firebase.js';

const orderBox = document.getElementById("orders");
const depositBox = document.getElementById("deposits");

onSnapshot(collection(db, "orders"), (snapshot) => {
  let html = "";

  snapshot.forEach((item) => {
    const d = item.data();
    html += `
      <div>
        👤 ${d.email} | 📦 ${d.service} | 💰 ${d.amount}đ | ${d.status}
      </div>
      <hr>
    `;
  });

  orderBox.innerHTML = html || "Không có đơn";
});

onSnapshot(collection(db, "deposits"), (snapshot) => {
  let html = "";

  snapshot.forEach((item) => {
    const d = item.data();
    html += `
      <div>
        👤 ${d.email} | 💳 ${d.amount}đ | ${d.status}
      </div>
      <hr>
    `;
  });

  depositBox.innerHTML = html || "Không có yêu cầu";
});
</script>

</body>
</html>
</html>
